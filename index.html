<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistant Exa Engenharia</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        
        #chat-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background-color: #005bb5;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            animation: bounce 2s infinite;
            font-size: 24px;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        #chat-widget.hidden {
            display: none;
        }

        #chat-widget:hover {
            animation: none;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-10px);
            }
            60% {
                transform: translateY(-5px);
            }
        }

        @keyframes desintegrar {
            0% {
             opacity: 1;
             transform: scale(1);
             filter: blur(0);
            }
            100% {
             opacity: 0;
             transform: scale(0.9);
             filter: blur(5px);
            }
        }

.desintegrando {
    animation: desintegrar 0.5s ease-out forwards;
}


        #chat-widget-notification {
            position: absolute;
            top: 5px;
            right: 5px;
            background-color: red;
            color: white;
            font-size: 12px;
            font-weight: bold;
            width: 20px;
            height: 20px;
            display: none;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
        }

        #chat-box {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 330px;
            height: 600px;
            background-color: #f9f9f9;
            border: 1px solid #ccc;
            border-radius: 10px;
            display: none;
            flex-direction: column;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 0.3s ease, transform 0.3s ease;
            overflow: hidden; /* Remove qualquer conteúdo que "escorregue" pelas bordas */
        }

        #chat-box.visible {
            display: flex;
            opacity: 1;
            transform: scale(1);
        }

        #chat-box-header {
            background-color: #314b73;
            color: white;
            padding: 10px;
            border-radius: 10px 10px 0 0;
            text-align: center;
            font-weight: bold;
            font-size: 18px; /* Aumenta o tamanho do título, se quiser */
            text-shadow: 1px 1px 2px black; /* Adiciona borda preta ao redor do texto */
        }

        #chat-box-messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            position: relative;
        }

        #chat-box-messages div {
            margin-bottom: 10px;
        }

        .user {
            font-weight: bold;
            color: #000; /* Texto preto */
        }

        .ExaBot {
            font-weight: bold;
            color: #314b73;
        }

        .ExaBot-message {
            color: black;
            font-weight: normal;
        }

        .typing-indicator {
            font-style: italic;
            color: #777;
        }

        #chat-box-input {
            display: flex;
            border-top: 1px solid #ccc;
        }

        #chat-box-input input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 0 0 0 10px;
            font-size: 15px; /* Aumenta o tamanho da fonte */
        }

        #chat-box-input button {
            padding: 10px;
            background-color: #314b73;
            color: white;
            border: none;
            border-radius: 0 0 10px 0;
            font-size: 14px; /* Aumenta o tamanho da fonte */
            cursor: pointer;
            font-weight: bold; /* Deixa o texto do botão em negrito */
            text-shadow: 1px 1px 2px black; /* Adiciona borda preta ao redor do texto */
        }

        #minimize-chat {
           position: absolute;
           top: 10px;
           right: 10px;
           background-color: transparent;
           border: none;
           font-size: 16px;
           font-weight: bold;
           color: white;
           cursor: pointer;
           outline: none;
           
        }

        #settings-gear {
    position: absolute;
    top: 10px;
    right: 43px; /* Ajusta a posição ao lado do botão de minimizar */
    background-color: transparent;
    border: none;
    font-size: 20px; /* Tamanho da engrenagem */
    color: white;
    cursor: pointer;
    outline: none;
    padding: 0; /* Remove espaçamento interno */
    transition: transform 0.3s ease; /* Suaviza a rotação */
    transform-origin: center center; /* Garante rotação no centro */
    width: 24px; /* Tamanho fixo para evitar deslocamento */
    height: 24px; /* Tamanho fixo para evitar deslocamento */
    display: flex;
    align-items: center;
    justify-content: center;
}

#settings-gear.rotate-right {
    transform: rotate(90deg); /* Gira 90 graus para a direita */
}

#settings-gear.rotate-left {
    transform: rotate(-90deg); /* Gira 90 graus para a esquerda */
}


        #settings-gear:hover {
           color: #ccc; /* Cor mais clara no hover */
        }

        #settings-menu {
           position: absolute;
           top: 50px;
           right: 10px;
           background-color: #ffffff;
           border: 1px solid #ccc;
           border-radius: 10px;
           box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
           padding: 15px;
           display: none; /* Começa oculto */
           z-index: 1000;
           width: 278px;
           font-family: Arial, sans-serif;
        }

        #settings-menu button {
    padding: 2px 5px; /* Aumenta o tamanho interno dos botões */
    font-size: 0.9rem; /* Ajusta o tamanho da fonte nos botões */

    /* Estilo para os botões menores e juntos */
#settings-menu .settings-item button {
    padding: 5px 10px; /* Reduz o tamanho interno dos botões */
    font-size: 0.8rem; /* Deixa a fonte menor */
    margin: 0; /* Remove espaçamento externo dos botões */
    border-radius: 5px; /* Mantém bordas arredondadas */
}
}

/* Espaçamento entre nome da configuração e os botões */
#settings-menu .settings-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px; /* Espaçamento entre os itens */
}


        #settings-menu h3 {
        margin: 0 0 10px 0;
        font-size: 18px;
        color: #333;
        text-align: center;
         }

        .settings-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        margin-bottom: 20px; /* Espaço entre os itens */
        gap: none; /* Adiciona espaço entre o texto e o botão */
         }

        #current-language {
        font-size: 14px;
        cursor: pointer; /* Mostra o cursor de mão ao passar o mouse */
        color: #666; /* Cor cinza para o texto "Automático" */
         }

        #language-options {
        display: flex;
        flex-direction: column;
        gap: 10px; /* Espaçamento entre os botões */
         }

        .language-btn {
        background-color: #314b73;
        color: white;
        border: none;
        padding: 10px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
        text-align: center;
         }

        .ExaBot-support-message {
         background-color: #ffffff; /* Fundo branco */
         border: 1px solid #ccc; /* Borda cinza clara */
         border-radius: 10px; /* Cantos arredondados */
         padding: 15px; /* Espaçamento interno */
         color: #333; /* Texto escuro */
         font-size: 14px; /* Tamanho do texto */
         box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1); /* Sombra para destacar */
         margin-bottom: 10px; /* Espaçamento entre mensagens */
         line-height: 1.5; /* Altura da linha para melhor legibilidade */
         }


        .language-btn:hover {
         background-color: #1e3554; /* Tom mais escuro no hover */
         }


        .settings-item label {
         font-size: 14px;
         color: #333;
         }

         #theme-toggle {
         width: 40px;
         height: 20px;
         appearance: none;
         background-color: #ccc;
         border-radius: 20px;
         position: relative;
         outline: none;
         cursor: pointer;
         transition: background-color 0.3s ease;
        }

        #theme-toggle:checked {
           background-color: #4caf50;
        }

        #theme-toggle::before {
           content: "";
           position: absolute;
           width: 18px;
           height: 18px;
           background-color: white;
           border-radius: 50%;
           top: 1px;
           left: 1px;
           transition: transform 0.3s ease;
         }

        #theme-toggle:checked::before {
           transform: translateX(20px);
        }

         #minimize-chat:hover {
           color: #ccc;
        }


        #chat-box-input button:hover {
            background-color: #1e3554;
            border-color: #003366; /* Altera a cor da borda ao passar o mouse, se quiser */
        }

         /* Animação de digitação (três pontinhos) */
    .typing-indicator {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 30px;
    }

    .typing-indicator span {
        width: 8px;
        height: 8px;
        margin: 0 3px;
        background-color: #314b73;
        border-radius: 50%;
        display: inline-block;
        animation: bounce 1.4s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(1) {
        animation-delay: -0.32s;
    }

    .typing-indicator span:nth-child(2) {
        animation-delay: -0.16s;
    }

    .typing-indicator span:nth-child(3) {
        animation-delay: 0;
    }

    .hidden {
    opacity: 0; /* Elemento invisível inicialmente */
    visibility: hidden;
    transition: opacity 0.2s ease-in; /* Suaviza a exibição */
    }

    /* Balão de pensamento */
    #thought-bubble {
    position: fixed;
    bottom: 90px;
    right: 25px;
    background: white;
    border: 1px solid #ccc;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    padding: 10px 15px;
    max-width: 250px;
    font-size: 14px;
    display: none;
    animation: fadeIn 0.5s ease;
    }

    #thought-bubble::after {
    content: "";
    position: absolute;
    bottom: -10px;
    right: 15px;
    border-width: 10px;
    border-style: solid;
    border-color: white transparent transparent transparent;
    }

    #thought-bubble-close {
    position: absolute;
    top: 5px;
    right: 5px;
    background: transparent;
    border: none;
    font-size: 16px;
    cursor: pointer;
    }

    @keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
    
    }

    .question-btn {
        background-color: #314b73;
        color: white;
        border: 2px solid #25344f; /* Azul escuro para combinar */
        border-radius: 15px 15px 15px 0; /* Arredonda apenas os cantos direito */
        padding: 12px; /* Um leve aumento no espaçamento interno */
        margin-bottom: 10px;
        cursor: pointer;
        text-align: left;
        font-size: 15px; /* Aumenta o tamanho da letra */
        font-weight: bold; /* Deixa o texto em negrito */
        text-shadow: 1px 1px 2px black; /* Adiciona borda preta ao redor das letras */
        position: relative; /* Necessário para a ponta */
        box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.2); /* Sombra leve e estática */
    }
    
    #predefined-questions {
    display: none;
}

    .question-btn:hover {
        background-color: #1e3554;
        box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.3); /* Sombra mais intensa no hover */
    }

    @media (max-width: 768px) {
    #chat-box {
        width: 90%; /* Ajusta para ocupar 90% da largura da tela */
        bottom: 20px; /* Aproxima do fundo */
        right: 5%; /* Centraliza horizontalmente */
        height: 60%; /* Reduz a altura */
    }

    #chat-widget {
        bottom: 10px; /* Aproxima mais do fundo */
        right: 10px; /* Ajusta a posição lateral */
        width: 50px;
        height: 50px;
        font-size: 20px;
    }

    #thought-bubble {
        bottom: 70px; /* Ajusta a posição para telas menores */
        right: 10px;
        max-width: 200px; /* Reduz o tamanho do balão */
        font-size: 12px;
    }

    #chat-box-header {
        font-size: 16px; /* Reduz o tamanho do título */
    }

    .question-btn {
        font-size: 14px; /* Reduz o tamanho do texto nos botões */
        padding: 10px; /* Ajusta o espaçamento interno */
    }
    }

    @media (max-width: 480px) {
    #chat-box {
        height: 50%; /* Reduz ainda mais a altura em telas muito pequenas */
    }

    #chat-widget {
        width: 40px;
        height: 40px;
        font-size: 18px;
    }

    #thought-bubble {
        font-size: 10px; /* Reduz o texto do balão */
    }

    .question-btn {
        font-size: 12px; /* Ajusta o texto das perguntas */
        padding: 8px;
    }
    
    }

    /* Tema claro (padrão) */
#chat-box.light-theme {
    --background-color: #f9f9f9;
    --text-color: #333;
    --header-color: #314b73;
    --input-background: #ffffff;
    --input-text-color: #333;
    --button-background: #314b73;
    --button-hover: #1e3554;
}

/* Estilo do texto no menu de configurações para o tema claro */
#chat-box.light-theme #settings-menu {
    background-color: #ffffff; /* Fundo branco */
    color: #333; /* Texto escuro */
    border: 1px solid #ccc; /* Borda clara */
}

/* Tema claro (padrão) */
#chat-box.light-theme .ExaBot-message {
    color: black; /* Cor do texto no tema claro */
}

/* Título do menu de configurações no tema claro */
#chat-box.light-theme #settings-menu h3 {
    color: #333; /* Texto escuro */
}

#chat-box.light-theme .user {
    color: #ff6f00; /* Cor das mensagens do usuário */
}

/* Cor do nome "ExaBot" no tema claro */
#chat-box.light-theme .ExaBot {
    color: #314b73; /* Cor original para o tema claro */
}

/* Tema escuro */
#chat-box.dark-theme {
    --background-color: #1e1e1e;
    --text-color: #f9f9f9;
    --header-color: #314b73;
    --input-background: #333;
    --input-text-color: #f9f9f9;
    --button-background: #314b73;
    --button-hover: #1e3554;
}

/* Estilo específico para os rótulos e textos */
#chat-box.dark-theme #settings-menu label,
#chat-box.dark-theme #settings-menu span {
    color: #f9f9f9; /* Texto branco */
    font-family: Arial, sans-serif; /* Mesma fonte padrão */
}

/* Estilo do texto no menu de configurações para o tema escuro */
#chat-box.dark-theme #settings-menu {
    background-color: #333; /* Fundo escuro */
    color: #f9f9f9; /* Texto branco */
    border: 1px solid #555; /* Borda escura */
}

/* Tema escuro */
#chat-box.dark-theme .ExaBot-message {
    color: white; /* Cor do texto no tema escuro */
}

/* Título do menu de configurações no tema escuro */
#chat-box.dark-theme #settings-menu h3 {
    color: #f9f9f9; /* Texto branco */
    font-family: Arial, sans-serif; /* Mesma fonte do restante */
}

#chat-box.dark-theme .user {
    color: #ffae42; /* Ajusta para melhor visibilidade no tema escuro */
}

/* Cor do nome "ExaBot" no tema escuro */
#chat-box.dark-theme .ExaBot {
    color: #4caf50; /* Um tom de verde mais claro para melhor contraste */
}

/* Status no tema claro */
#chat-box.light-theme #chat-status {
    background-color: #f1f1f1 !important;
    border-bottom: 1px solid #ccc !important;
}

/* Status específico para "online", "processando" e "offline" no tema claro */
#chat-box.light-theme #chat-status.online {
    color: #28a745 !important; /* Verde */
}

#chat-box.light-theme #chat-status.processando {
    color: #ffa500 !important; /* Amarelo */
}

#chat-box.light-theme #chat-status.offline {
    color: #dc3545 !important; /* Vermelho */
}

/* Status no tema escuro */
#chat-box.dark-theme #chat-status {
    background-color: #333 !important;
    border-bottom: 1px solid #555 !important;
}

/* Status específico para "online", "processando" e "offline" no tema escuro */
#chat-box.dark-theme #chat-status.online {
    color: #4caf50 !important; /* Verde claro */
}

#chat-box.dark-theme #chat-status.processando {
    color: #ffc107 !important; /* Amarelo claro */
}

#chat-box.dark-theme #chat-status.offline {
    color: #ff6f61 !important; /* Vermelho suave */
}

/* Tema claro */
#chat-box.light-theme #chat-status {
    background-color: #f1f1f1; /* Fundo claro */
    border-bottom: 1px solid #ccc; /* Borda clara */
}

/* Tema escuro */
#chat-box.dark-theme #chat-status {
    background-color: #333; /* Fundo escuro */
    border-bottom: 1px solid #555; /* Borda escura */
}


/* Aplicação das variáveis ao ExaBot */
#chat-box {
    background-color: var(--background-color);
    color: var(--text-color);
    border-color: var(--header-color);
    transition: background-color 0.3s ease, color 0.3s ease;
}

/* Cor do texto de placeholder no campo de entrada no tema claro */
#chat-box.light-theme #chat-input::placeholder {
    color: #666; /* Cor cinza para o tema claro */
}

/* Cor do texto de placeholder no campo de entrada no tema escuro */
#chat-box.dark-theme #chat-input::placeholder {
    color: #f9f9f9; /* Cor branca para o tema escuro */
}

/* Cor do texto digitado no campo de entrada no tema claro */
#chat-box.light-theme #chat-input {
    color: #333; /* Cor preta para o tema claro */
}

/* Cor do texto digitado no campo de entrada no tema escuro */
#chat-box.dark-theme #chat-input {
    color: #f9f9f9; /* Cor branca para o tema escuro */
}

/* Mantém o estilo do botão alternador no tema escuro */
#chat-box #theme-toggle {
    background-color: #ccc; /* Cor padrão do botão */
}

/* Estilo do balão de mensagens no chat */
.ExaBot-support-message {
    background-color: #ffffff; /* Fundo branco */
    color: #000000; /* Texto preto */
    border: 1px solid #ccc; /* Borda cinza clara */
    border-radius: 10px; /* Cantos arredondados */
    padding: 15px; /* Espaçamento interno */
    font-size: 14px; /* Tamanho do texto */
    box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1); /* Sombra para destacar */
    margin-bottom: 10px; /* Espaçamento entre mensagens */
    line-height: 1.5; /* Altura da linha para melhor legibilidade */
}

#chat-box #theme-toggle:checked {
    background-color: #4caf50; /* Verde para o botão ativado */
}

#chat-box-header {
    background-color: var(--header-color);
}

#chat-box-input {
    background-color: var(--input-background);
}

#chat-box-input input {
    background-color: var(--input-background);
    color: var(--input-text-color);
    border: none;
    border-radius: 0 0 0 10px; /* Arredonda apenas o canto inferior esquerdo */
}

#chat-box-input button {
    background-color: var(--button-background);
    border-radius: 0 0 10px 0; /* Arredonda apenas o canto inferior direito */
}

#chat-box-input button:hover {
    background-color: var(--button-hover);
}

/* Estilo do scrollbar para navegadores WebKit (Chrome, Edge, etc.) */
#chat-box-messages::-webkit-scrollbar {
    width: 6px; /* Largura do scroll */
}

#chat-box-messages::-webkit-scrollbar-track {
    background: transparent; /* Fundo do track do scroll */
}

#chat-box-messages::-webkit-scrollbar-thumb {
    background-color: rgba(0, 0, 0, 0.2); /* Cor do "polegar" do scroll */
    border-radius: 10px; /* Bordas arredondadas */
    border: 2px solid transparent; /* Espaço entre o polegar e o track */
    background-clip: padding-box; /* Ajuste para evitar que a borda sobreponha */
}

#chat-box-messages::-webkit-scrollbar-thumb:hover {
    background-color: rgba(0, 0, 0, 0.3); /* Cor do polegar ao passar o mouse */
}

/* Para navegadores que suportam a propriedade "scrollbar-width" */
#chat-box-messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    position: relative;
    scrollbar-width: thin;
    scrollbar-color: rgba(0, 0, 0, 0.2) transparent;

    -webkit-overflow-scrolling: touch; /* Ativa o scroll de elasticidade no iOS e navegadores WebKit */
    overscroll-behavior: contain; /* Evita propagação do scroll para fora do elemento */
}

/* Controle de tamanho de fonte */
.font-small {
    font-size: 0.9rem;
}

.font-medium {
    font-size: 1rem;
}

.font-large {
    font-size: 1.2rem;
}

</div>

    <script>
        const chatWidget = document.getElementById('chat-widget');
        const chatBox = document.getElementById('chat-box');
        const chatInput = document.getElementById('chat-input');
        const sendButton = document.getElementById('send-button');
        const chatMessages = document.getElementById('chat-box-messages');
        const notification = document.getElementById('chat-widget-notification');
        const thoughtBubble = document.getElementById('thought-bubble');
        const thoughtBubbleClose = document.getElementById('thought-bubble-close');
        const minimizeButton = document.getElementById('minimize-chat'); // Botão de minimizar
        const settingsMenu = document.getElementById('settings-menu');
        const settingsGear = document.getElementById('settings-gear');
        const currentLanguage = document.getElementById('current-language'); // Botão "Automático" 
        const themeToggle = document.getElementById('theme-toggle'); // Referência ao botão de alternância de tema
        const chatStatus = document.getElementById('chat-status'); // Seleciona o elemento do status

// Controles de tamanho de fonte
const increaseFontBtn = document.getElementById('increase-font');
const decreaseFontBtn = document.getElementById('decrease-font');
const resetFontBtn = document.getElementById('reset-font');

let currentFontSize = 1; // Tamanho padrão

// Funções para manipular o tamanho da fonte
const updateFontSize = (sizeMultiplier) => {
    currentFontSize = sizeMultiplier;
    chatBox.style.fontSize = `${currentFontSize}rem`;

    // Garante que o menu de configurações não seja impactado
    settingsMenu.style.fontSize = '1rem'; // Mantém tamanho fixo para o menu
};

increaseFontBtn.addEventListener('click', () => {
    updateFontSize(Math.min(currentFontSize + 0.1, 1.5)); // Limita a 1.5x o tamanho padrão
});

decreaseFontBtn.addEventListener('click', () => {
    updateFontSize(Math.max(currentFontSize - 0.1, 0.8)); // Limita a 0.8x o tamanho padrão
});

resetFontBtn.addEventListener('click', () => {
    updateFontSize(1); // Reseta ao tamanho padrão
});

// Tornar menu acessível
settingsMenu.setAttribute('aria-hidden', 'true');
settingsMenu.addEventListener('focusout', (event) => {
    if (!settingsMenu.contains(event.relatedTarget)) {
        settingsMenu.setAttribute('aria-hidden', 'true');
    }
});

// Ajusta o foco para elementos interativos
document.addEventListener('keydown', (event) => {
    if (event.key === 'Tab') {
        const focusableElements = chatBox.querySelectorAll(
            'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
        );
        const firstElement = focusableElements[0];
        const lastElement = focusableElements[focusableElements.length - 1];

        if (event.shiftKey && document.activeElement === firstElement) {
            event.preventDefault();
            lastElement.focus();
        } else if (!event.shiftKey && document.activeElement === lastElement) {
            event.preventDefault();
            firstElement.focus();
        }
    }
});

    // Função para atualizar o status do chat dinamicamente
    const atualizarStatus = (status) => {
    const chatStatus = document.getElementById('chat-status');

    // Remove classes de status antigas
    chatStatus.classList.remove('online', 'processando', 'offline');

    // Adiciona a classe correspondente ao status
    chatStatus.classList.add(status);

    // Define o texto do status
    if (status === 'online') {
        chatStatus.textContent = 'Online';
    } else if (status === 'processando') {
        chatStatus.textContent = 'Processando...';
    } else if (status === 'offline') {
        chatStatus.textContent = 'Offline';
    }
};

// Atualiza o status ao carregar o chat
document.addEventListener('DOMContentLoaded', () => {
    atualizarStatus('online'); // Define como online inicialmente
});


        const exibirSaudacaoInicial = () => {
    const saudacaoTexto = "Como posso ajudá-lo hoje? Escolha uma pergunta abaixo ou digite a sua:";
    const mensagemContainer = document.createElement('div');
    mensagemContainer.innerHTML = `<span class="ExaBot">ExaBot:</span> <span class="ExaBot-message"></span>`;
    const mensagemTexto = mensagemContainer.querySelector('.ExaBot-message');
    const digitarPerguntas = () => {
    const perguntasContainer = document.getElementById('predefined-questions');
    perguntasContainer.style.display = "flex"; // Exibe o container
    perguntasContainer.style.display = 'flex';
    perguntasContainer.style.flexDirection = 'column';
    perguntasContainer.style.marginTop = '-20px'; // Ajuste aqui para subir as perguntas
    perguntasContainer.style.marginBottom = '10px'; // Mantém espaçamento inferior

    const perguntas = perguntasContainer.querySelectorAll('.question-btn');
    perguntas.forEach((button, index) => {
        const texto = button.getAttribute('data-question');
        button.classList.add('hidden'); // Garante que todas as perguntas comecem ocultas

        // Mostra e anima cada botão após o anterior
        setTimeout(() => {
            button.classList.remove('hidden'); // Exibe o botão
            button.textContent = ""; // Limpa o texto atual para animação

            // Animação de digitação para o texto
            let i = 0;
            const interval = setInterval(() => {
                button.textContent += texto[i];
                i++;

                if (i === texto.length) {
                    clearInterval(interval); // Finaliza a digitação
                }
            }, 50); // Velocidade ajustável
        }, index * 1500); // Atraso entre cada botão (ajustável)
    });
};

    // Adiciona no topo da área de mensagens
    chatMessages.insertBefore(mensagemContainer, chatMessages.firstChild);

    let index = 0;
    const interval = setInterval(() => {
        mensagemTexto.textContent += saudacaoTexto[index];
        index++;

        if (index === saudacaoTexto.length) {
            clearInterval(interval);
            // Exibe as perguntas apenas após a saudação terminar
            digitarPerguntas();
        }
    }, 50); // Velocidade de digitação ajustável
};
        
        // Atualiza o status ao alternar o tema
themeToggle.addEventListener('change', () => {
    if (themeToggle.checked) {
        chatBox.classList.add('dark-theme'); // Aplica tema escuro
        chatBox.classList.remove('light-theme'); // Remove tema claro
    } else {
        chatBox.classList.add('light-theme'); // Aplica tema claro
        chatBox.classList.remove('dark-theme'); // Remove tema escuro
    }
    atualizarStatus(chatStatus.textContent.toLowerCase()); // Atualiza a cor do status com base no tema ativo
});
        
        // Função para simular digitação
        function simulateTyping(message) {
        const typingIndicator = document.createElement('div');
        typingIndicator.className = 'typing-indicator';
        typingIndicator.innerHTML = `<span></span><span></span><span></span>`;
        chatMessages.appendChild(typingIndicator);
        chatMessages.scrollTop = chatMessages.scrollHeight;

        setTimeout(() => {
        chatMessages.removeChild(typingIndicator);

        const botMessage = document.createElement('div');
        botMessage.className = 'ExaBot-message';
        botMessage.textContent = message;
        chatMessages.appendChild(botMessage);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        }, 2000); // Tempo para simular a digitação
        }

        // Evento ao clicar no botão "Automático"
        currentLanguage.addEventListener('click', () => {
    const message = `
        <strong>Português:</strong> Eu posso me comunicar no idioma que você escolher. Basta fazer sua pergunta no idioma desejado, e te responderei automaticamente!<br><br>
        <strong>English:</strong> I can communicate in the language you choose. Just ask your question in the desired language, and I will respond automatically!
    `;

    // Fecha o menu de configurações
    settingsMenu.style.display = 'none';

    // Simula a digitação da mensagem no estilo do ExaBot com balão branco
    simulateTypingWithBalloon(message);

    // Foca no chat
    chatBox.classList.add('visible');
    chatWidget.classList.add('hidden');
});

    // Função para exibir balão com mensagens combinadas
    function simulateTypingWithBalloon(message) {
    const typingIndicator = document.createElement('div');
    typingIndicator.className = 'typing-indicator';
    typingIndicator.innerHTML = `<span></span><span></span><span></span>`;
    chatMessages.appendChild(typingIndicator);
    chatMessages.scrollTop = chatMessages.scrollHeight;

    setTimeout(() => {
        chatMessages.removeChild(typingIndicator);

        const botMessage = document.createElement('div');
        botMessage.className = 'ExaBot-support-message'; // Usa o estilo do balão
        botMessage.innerHTML = message; // Permite formatação HTML
        chatMessages.appendChild(botMessage);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }, 2000); // Tempo para simular a digitação
}

settingsGear.addEventListener('click', () => {
    settingsMenu.style.display = settingsMenu.style.display === 'block' ? 'none' : 'block';
    

    // Alterna entre as classes de rotação
    if (isRotatedRight) {
        settingsGear.classList.remove('rotate-right');
        settingsGear.classList.add('rotate-left');
    } else {
        settingsGear.classList.remove('rotate-left');
        settingsGear.classList.add('rotate-right');
    }

    isRotatedRight = !isRotatedRight; // Alterna o estado
});

// Fecha o menu de configurações ao clicar fora
document.addEventListener('click', (event) => {
    const isClickInsideSettingsMenu = settingsMenu.contains(event.target); // Verifica se clicou dentro do menu
    const isClickInsideSettingsGear = settingsGear.contains(event.target); // Verifica se clicou na engrenagem
    const isClickInsideChat = chatBox.contains(event.target); // Verifica se clicou dentro do chat
    const isClickInsideWidget = chatWidget.contains(event.target); // Verifica se clicou no widget

if (!isClickInsideChat && !isClickInsideWidget) {
    // Fecha o chat
    chatBox.classList.remove('visible');
    chatWidget.classList.remove('hidden');

    // Fecha o menu de ajustes se estiver aberto
    if (settingsMenu.style.display === 'block') {
        settingsMenu.style.display = 'none'; // Fecha os ajustes

        // Garante que a engrenagem volte à posição inicial (fechada)
        if (isRotatedRight) {
            settingsGear.classList.remove('rotate-right');
            settingsGear.classList.add('rotate-left');
            isRotatedRight = false; // Atualiza o estado
        }
    }

    // Mostra notificação se houver resposta pendente
    if (responsePending) {
        notification.style.display = "flex";
    }
}
});

        let perguntasAnimadas = false;
        let responsePending = false;
        let mensagemInicialExibida = false;
        let userScrolling = false; // Variável para controlar o estado do scroll
        let isRotatedRight = false; // Controle da direção atual
        

        // Botão de minimizar, clicando "fora" do site
    minimizeButton.addEventListener('click', () => {
    // Fecha o chat
    chatBox.classList.remove('visible');
    chatWidget.classList.remove('hidden');

    // Fecha o menu de ajustes se estiver aberto
    if (settingsMenu.style.display === 'block') {
        settingsMenu.style.display = 'none'; // Fecha o menu de ajustes

        // Garante que a engrenagem volte para a posição inicial (fechada)
        if (isRotatedRight) {
            settingsGear.classList.remove('rotate-right');
            settingsGear.classList.add('rotate-left');
            isRotatedRight = false;
        }
    }

    // Exibe notificação se houver resposta pendente
    if (responsePending) {
        notification.style.display = "flex";
    }
});

        // Detecção de interação manual com o scroll
        chatMessages.addEventListener('scroll', () => {
        const nearBottom = chatMessages.scrollHeight - chatMessages.scrollTop <= chatMessages.clientHeight + 10;
        userScrolling = !nearBottom; // Se estiver perto do final, o scroll é automático
        });
        
        // Acionamento automático ao carregar a página
        const pingServer = async () => {
            try {
                await fetch('https://chatbot-exa.onrender.com/ping'); // Rota de "ping"
                console.log('Servidor ativado automaticamente.');
            } catch (error) {
                console.error('Erro ao acionar o servidor:', error);
            }
        };

        // Chama o servidor ao carregar a página (para a notificação do ExaBot)
        window.addEventListener('load', pingServer);

        // Alterna entre balão e chat
                 chatWidget.addEventListener('click', async () => {
           if  (!chatBox.classList.contains('visible')) {
                 chatBox.classList.add('visible');
                 chatWidget.classList.add('hidden');

                 thoughtBubble.style.display = 'none';
                 chatInput.blur();
                 notification.style.display = "none";
                 chatInput.focus();

        // Rola automaticamente para o final se o usuário não estiver interagindo
        if (!userScrolling) {
            
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

                digitarPerguntas(); // Inicia a animação de digitação das perguntas

                // Backup: acionar o servidor ao clicar no balão, caso ainda não tenha sido feito
                await pingServer();
            }
        });

        // Fecha os ajustes ao clicar fora do menu de configurações, mas ainda dentro do chat
document.addEventListener('click', (event) => {
    const isClickInsideSettingsMenu = settingsMenu.contains(event.target); // Verifica se clicou dentro do menu de ajustes
    const isClickInsideSettingsGear = settingsGear.contains(event.target); // Verifica se clicou na engrenagem
    const isClickInsideChat = chatBox.contains(event.target); // Verifica se clicou dentro do chat

    if (isClickInsideChat && !isClickInsideSettingsMenu && !isClickInsideSettingsGear) {
        // Fecha o menu de ajustes se estiver aberto
        if (settingsMenu.style.display === 'block') {
            settingsMenu.style.display = 'none'; // Fecha os ajustes

            // Garante que a engrenagem volte à posição inicial (fechada)
            if (isRotatedRight) {
                settingsGear.classList.remove('rotate-right');
                settingsGear.classList.add('rotate-left');
                isRotatedRight = false; // Atualiza o estado
            }
        }
    }
});

        // Função para adicionar emojis ao lado das palavras-chave nas respostas do ExaBot
        const adicionarEmojis = (texto) => {
        const regras = {
            "especialistas": "👨‍💻",
            "trabalhando": "🔄",
            "erro": "❌",
            "finalizado": "✅",
            "ajudar!": "🤝",
            "suporte técnico": "🔧",
            "atendimento": "🕒",
            "endereço": "📍",
            "disposição": "😀",
            "opinião": "🌟"
        };

        // Substituir palavras-chave por palavra + emoji apenas nas respostas do ExaBot
        for (const [palavra, emoji] of Object.entries(regras)) {
            const regex = new RegExp(`\\b(${palavra})\\b`, "gi");
            texto = texto.replace(regex, `$1 ${emoji}`);
        }

        return texto; // Texto atualizado com emojis
    };

    // Processar markdown e emojis (somente para respostas do ExaBot)
        const processarMarkdown = (texto, tipo) => {
        if (tipo === "ExaBot") {
            texto = adicionarEmojis(texto); // Adiciona emojis apenas nas respostas do ExaBott
        }
        return texto.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>");
    };

    // Renderiza mensagens no chat
    const renderizarMensagem = (texto, tipo) => {
    const mensagem = document.createElement('div');
    mensagem.innerHTML = `<span class="${tipo}">${tipo === "user" ? "Você" : "ExaBot"}:</span> 
        <span class="${tipo === "ExaBot" ? "ExaBot-message" : ""}">
        ${processarMarkdown(texto, tipo)}
        </span>`;
    chatMessages.appendChild(mensagem);

    ajustarScroll(true); // Força o ajuste do scroll após a mensagem
};

    const ajustarScroll = (forcar = false) => {
    if (forcar || !userScrolling) {
        setTimeout(() => {
            chatMessages.scrollTop = chatMessages.scrollHeight; // Garante que o scroll vá até o final
        }, 0); // Delay mínimo para sincronizar com a renderização
    }
};

    // Exibir texto gradual com controle de scroll
        const renderizarTextoGradual = (texto) => {
        return new Promise((resolve) => {
        const mensagemContainer = document.createElement('div');
        mensagemContainer.innerHTML = `<span class="ExaBot">ExaBot:</span> <span class="ExaBot-message"></span>`;
        const mensagemTexto = mensagemContainer.querySelector('.ExaBot-message');
        chatMessages.appendChild(mensagemContainer);

        let index = 0;
        const interval = setInterval(() => {
            mensagemTexto.innerHTML = processarMarkdown(texto.slice(0, index + 1), "ExaBot");
            index++;

            // Scroll automático apenas se o usuário não estiver visualizando mensagens antigas
            if (!userScrolling) {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            if (index === texto.length) {
                clearInterval(interval);
                resolve();
            }
        }, 25); // Velocidade de digitação ajustada para 25ms
    });
    };
    // Envia mensagens para o backend e exibe resposta gradual
    const sendMessage = async () => {
    const message = chatInput.value.trim();

    if (message) {
        renderizarMensagem(message, "user"); // Exibe a mensagem do usuário
        chatInput.value = '';
        responsePending = true;

        atualizarStatus('processando'); // Mostra "Processando..." durante o envio

        // Indicador de digitação (3 bolinhas)
        const typingIndicator = document.createElement('div');
        typingIndicator.className = 'typing-indicator';
        typingIndicator.innerHTML = '<span></span><span></span><span></span>';
        chatMessages.appendChild(typingIndicator);

        // Variável para armazenar o elemento da mensagem intermediária
        let intermediateMessage;

        // Configuração do timer de 5 segundos para exibir a mensagem intermediária
        let timer = setTimeout(async () => {
            intermediateMessage = document.createElement('div');
            intermediateMessage.innerHTML = `<span class="ExaBot">ExaBot:</span> <span class="ExaBot-message">Estamos processando sua pergunta. Por favor, aguarde mais alguns instantes... 😊</span>`;
            chatMessages.appendChild(intermediateMessage);

            // Faz scroll automático, caso necessário
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }, 5000); // Exibe mensagem intermediária após 5 segundos

        try {
            const response = await fetch('https://chatbot-exa.onrender.com/chatbot', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mensagem: message }),
            });

            if (!response.ok) {
                throw new Error('Falha na resposta do servidor');
            }

            const data = await response.json();

            // Cancela o timer se a resposta chegar antes de 5 segundos
            clearTimeout(timer);

            // Remove o indicador de digitação
            chatMessages.removeChild(typingIndicator);

            // Adiciona animação de desaparecimento à mensagem intermediária
            if (intermediateMessage) {
                intermediateMessage.classList.add('desintegrando');
                setTimeout(() => {
                    chatMessages.removeChild(intermediateMessage);
                }, 500); // Tempo da animação (0.5s)
            }

            // Renderiza a resposta do ExaBot
            atualizarStatus('online'); // Volta para "Online" após receber resposta
            await renderizarTextoGradual(data.resposta); // Exibe a resposta do ExaBot
        } catch (error) {
            console.error('Erro ao processar mensagem:', error);

            // Cancela o timer em caso de erro
            clearTimeout(timer);

            // Remove o indicador de digitação
            chatMessages.removeChild(typingIndicator);

            // Adiciona animação de desaparecimento à mensagem intermediária
            if (intermediateMessage) {
                intermediateMessage.classList.add('desintegrando');
                setTimeout(() => {
                    chatMessages.removeChild(intermediateMessage);
                }, 500); // Tempo da animação (0.5s)
            }

            atualizarStatus('offline'); // Define como "Offline" se houver erro
            renderizarMensagem('Houve um problema. Tente novamente mais tarde.', 'ExaBot');
        }

        responsePending = false;
    }
};

    sendButton.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (event) => {
            if (event.key === 'Enter') sendMessage();
        });

        // Balão de pensamento temporário
        setTimeout(() => {
            if (!chatBox.classList.contains('visible')) {
                thoughtBubble.style.display = 'block';
            }
        }, 3000);

        thoughtBubbleClose.addEventListener('click', () => {
            thoughtBubble.style.display = 'none';
        });


    // Também fecha o balão ao abrir o chat
    chatWidget.addEventListener('click', () => {
    if (!mensagemInicialExibida) {
        exibirSaudacaoInicial(); // Exibe a saudação
        mensagemInicialExibida = true; // Garante execução única
    }
});

    // Função para animar a digitação das perguntas
    const digitarPerguntas = async () => {
    if (perguntasAnimadas) return; // Sai da função se já foi executada

    perguntasAnimadas = true; // Marca como animado
    const perguntas = [
        "Quais serviços a EXA oferece?",
        "Qual seria o portfólio da EXA?",
        "Como faço para contratar um serviço?"
    ];

    for (let index = 0; index < perguntas.length; index++) {
        const button = questionButtons[index];
        const texto = perguntas[index];
        button.classList.remove('hidden'); // Exibe o botão
        button.textContent = ""; // Limpa o texto atual

        await new Promise((resolve) => {
            let i = 0;
            const interval = setInterval(() => {
                button.textContent += texto[i]; // Adiciona letra por letra
                i++;

                if (i === texto.length) {
                    clearInterval(interval); // Para a digitação quando terminar
                    resolve(); // Prossegue para a próxima pergunta
                }
            }, 50); // Velocidade de digitação ajustável
        });
    }
    };

    // Faz os botões das perguntas pré-prontas funcionarem
    const questionButtons = document.querySelectorAll('.question-btn');

        questionButtons.forEach(button => {
            button.addEventListener('click', () => {
                const question = button.getAttribute('data-question');
                chatInput.value = question;
                sendMessage();
            });
        });

        // Simulação para mudar status (personalizável conforme sua lógica)
        setTimeout(() => atualizarStatus('processando'), 2000); // Após 2 segundos
        setTimeout(() => atualizarStatus('online'), 5000); // Após 5 segundos

    </script>
