<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistant Exa Engenharia</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        
        #chat-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background-color: #005bb5;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            animation: bounce 2s infinite;
            font-size: 24px;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        #chat-widget.hidden {
            display: none;
        }

        #chat-widget:hover {
            animation: none;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-10px);
            }
            60% {
                transform: translateY(-5px);
            }
        }

        #chat-widget-notification {
            position: absolute;
            top: 5px;
            right: 5px;
            background-color: red;
            color: white;
            font-size: 12px;
            font-weight: bold;
            width: 20px;
            height: 20px;
            display: none;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
        }

        #chat-box {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 280px;
            height: 500px;
            background-color: #f9f9f9;
            border: 1px solid #ccc;
            border-radius: 10px;
            display: none;
            flex-direction: column;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        #chat-box.visible {
            display: flex;
            opacity: 1;
            transform: scale(1);
        }

        #chat-box-header {
            background-color: #314b73;
            color: white;
            padding: 10px;
            border-radius: 10px 10px 0 0;
            text-align: center;
            font-weight: bold;
            font-size: 18px; /* Aumenta o tamanho do título, se quiser */
            text-shadow: 1px 1px 2px black; /* Adiciona borda preta ao redor do texto */
        }

        #chat-box-messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            position: relative;
        }

        #chat-box-messages div {
            margin-bottom: 10px;
        }

        .user {
            font-weight: bold;
            color: #ff6f00;
        }

        .ExaBot {
            font-weight: bold;
            color: #314b73;
        }

        .ExaBot-message {
            color: black;
            font-weight: normal;
        }

        .typing-indicator {
            font-style: italic;
            color: #777;
        }

        #chat-box-input {
            display: flex;
            border-top: 1px solid #ccc;
        }

        #chat-box-input input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 0 0 0 10px;
            font-size: 15px; /* Aumenta o tamanho da fonte */
        }

        #chat-box-input button {
            padding: 10px;
            background-color: #314b73;
            color: white;
            border: none;
            border-radius: 0 0 10px 0;
            font-size: 14px; /* Aumenta o tamanho da fonte */
            cursor: pointer;
            font-weight: bold; /* Deixa o texto do botão em negrito */
            text-shadow: 1px 1px 2px black; /* Adiciona borda preta ao redor do texto */
        }

        #chat-box-input button:hover {
            background-color: #005bb5;
            border-color: #003366; /* Altera a cor da borda ao passar o mouse, se quiser */
        }

         /* Animação de digitação (três pontinhos) */
    .typing-indicator {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 30px;
    }

    .typing-indicator span {
        width: 8px;
        height: 8px;
        margin: 0 3px;
        background-color: #314b73;
        border-radius: 50%;
        display: inline-block;
        animation: bounce 1.4s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(1) {
        animation-delay: -0.32s;
    }

    .typing-indicator span:nth-child(2) {
        animation-delay: -0.16s;
    }

    .typing-indicator span:nth-child(3) {
        animation-delay: 0;
    }

    /* Balão de pensamento */
#thought-bubble {
    position: fixed;
    bottom: 90px;
    right: 25px;
    background: white;
    border: 1px solid #ccc;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    padding: 10px 15px;
    max-width: 250px;
    font-size: 14px;
    display: none;
    animation: fadeIn 0.5s ease;
}

#thought-bubble::after {
    content: "";
    position: absolute;
    bottom: -10px;
    right: 15px;
    border-width: 10px;
    border-style: solid;
    border-color: white transparent transparent transparent;
}

#thought-bubble-close {
    position: absolute;
    top: 5px;
    right: 5px;
    background: transparent;
    border: none;
    font-size: 16px;
    cursor: pointer;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.question-btn {
        background-color: #314b73;
        color: white;
        border: 2px solid #25344f; /* Azul escuro para combinar */;
        border-radius: 5px;
        padding: 10px;
        margin-bottom: 5px;
        cursor: pointer;
        text-align: left;
        font-size: 15px; /* Aumenta o tamanho da letra */
    font-weight: bold; /* Deixa o texto em negrito */
    text-shadow: 1px 1px 2px black; /* Adiciona borda preta ao redor das letras */
    }

    .question-btn:hover {
        background-color: #005bb5;
        box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.3); /* Sombra ao passar o mouse */
    }

</style>
</head>

<body>
    <div id="chat-widget">
        💬
        <div id="chat-widget-notification">1</div>
    </div>
    <div id="thought-bubble">
        <button id="thought-bubble-close">&times;</button>
        <p>Olá! Sou o ExaBot, o assistente virtual da Exa Engenharia. Estou aqui para ajudar com informações sobre nossos serviços, portfólio e muito mais. Escolha uma pergunta abaixo ou digite a sua! 🤖</p>
    </div>
    
    <div id="chat-box">
        <div id="chat-box-header">EXA Assistant</div>
        <div id="chat-box-messages">
            <div id="predefined-questions" style="display: flex; flex-direction: column; margin-bottom: 10px;">
                <button class="question-btn" data-question="Quais serviços a EXA oferece?">Quais serviços a EXA oferece?</button>
                <button class="question-btn" data-question="Posso saber mais sobre o portfólio da EXA?">Posso saber mais sobre o portfólio da EXA?</button>
                <button class="question-btn" data-question="Como faço para contratar um serviço?">Como faço para contratar um serviço?</button>
            </div>
        </div>
        <div id="chat-box-input">
            <input type="text" id="chat-input" placeholder="Digite sua pergunta...">
            <button id="send-button">Enviar</button>
        </div>
    </div>
    

    <script>
        const chatWidget = document.getElementById('chat-widget');
const chatBox = document.getElementById('chat-box');
const chatInput = document.getElementById('chat-input');
const sendButton = document.getElementById('send-button');
const chatMessages = document.getElementById('chat-box-messages');
const notification = document.getElementById('chat-widget-notification');

let responsePending = false;
let mensagemInicialExibida = false;
let userScrolling = false;

// Detecta interação do usuário com o scroll
chatMessages.addEventListener('scroll', () => {
    const isAtBottom =
        chatMessages.scrollTop + chatMessages.clientHeight >= chatMessages.scrollHeight - 20;

    // Se o usuário não estiver no final, assume que está interagindo manualmente
    userScrolling = !isAtBottom;
});

// Restante do seu script (sendMessage, renderizarMensagem, etc.)...


        // Alterna entre balão e chat
        chatWidget.addEventListener('click', () => {
            if (!chatBox.classList.contains('visible')) {
                chatBox.classList.add('visible');
                chatWidget.classList.add('hidden');

                thoughtBubble.style.display = 'none'; // Fecha o balão quando o chat é aberto


                chatInput.blur(); // Remove o foco do campo de input

                // Remove a notificação, se houver
                notification.style.display = "none";
                chatInput.focus(); // Receberá automaticamente o foco para começar a digitar.
            }
        });

        // Fecha o chat clicando fora
        document.addEventListener('click', (event) => {
            if (!chatBox.contains(event.target) && !chatWidget.contains(event.target)) {
                chatBox.classList.remove('visible');
                chatWidget.classList.remove('hidden');

                // Adiciona notificação se houver resposta pendente
                if (responsePending) {
                    notification.style.display = "flex";
                }
            }
        });

        // Função para adicionar emojis ao lado das palavras-chave nas respostas do ExaBot
    const adicionarEmojis = (texto) => {
        const regras = {
            "especialistas": "👨‍💻",
            "trabalhando": "🔄",
            "erro": "❌",
            "finalizado": "✅",
            "ajudar!": "🤝",
            "suporte técnico": "🔧",
            "atendimento": "🕒",
            "endereço": "📍",
            "disposição": "😀",
            "opinião": "🌟"
        };

        // Substituir palavras-chave por palavra + emoji apenas nas respostas do ExaBot
        for (const [palavra, emoji] of Object.entries(regras)) {
            const regex = new RegExp(`\\b(${palavra})\\b`, "gi");
            texto = texto.replace(regex, `$1 ${emoji}`);
        }

        return texto; // Texto atualizado com emojis
    };

    // Processar markdown e emojis (somente para respostas do ExaBot)
    const processarMarkdown = (texto, tipo) => {
        if (tipo === "ExaBot") {
            texto = adicionarEmojis(texto); // Adiciona emojis apenas nas respostas do ExaBott
        }
        return texto.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>");
    };

    // Renderiza mensagens no chat
    const renderizarMensagem = (texto, tipo) => {
        const mensagem = document.createElement('div');
        mensagem.innerHTML = `<span class="${tipo}">${tipo === "user" ? "Você" : "ExaBot"}:</span> <span class="${
            tipo === "ExaBot" ? "ExaBot-message" : ""
        }">${processarMarkdown(texto, tipo)}</span>`;
        chatMessages.appendChild(mensagem);

        // Faz o scroll automático, caso o usuário não esteja interagindo
        if (!userScrolling) {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    };

    // Exibe texto caractere por caractere
    const renderizarTextoGradual = (texto) => {
        return new Promise((resolve) => {
            const mensagemContainer = document.createElement('div');
            mensagemContainer.innerHTML = `<span class="ExaBot">ExaBot:</span> <span class="ExaBot-message"></span>`;
            const mensagemTexto = mensagemContainer.querySelector('.ExaBot-message');
            chatMessages.appendChild(mensagemContainer);

            let index = 0;
            const interval = setInterval(() => {
                mensagemTexto.innerHTML = processarMarkdown(texto.slice(0, index + 1), "ExaBot");
                index++;

                // Faz o scroll automático, caso o usuário não esteja interagindo
                if (!userScrolling) {
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }

                if (index === texto.length) {
                    clearInterval(interval);
                    resolve();
                }
            }, 25); // Velocidade de digitação ajustada para 25ms
        });
    };

    // Envia mensagens para o backend e exibe resposta gradual
    const sendMessage = async () => {
    const message = chatInput.value.trim();
    if (message) {
        renderizarMensagem(message, "user"); // Renderiza a mensagem do usuário
        chatInput.value = '';
        responsePending = true;

        // Indicador de digitação (3 bolinhas)
        const typingIndicator = document.createElement('div');
        typingIndicator.className = 'typing-indicator';
        typingIndicator.innerHTML = '<span></span><span></span><span></span>';
        chatMessages.appendChild(typingIndicator);

        try {
            const response = await fetch('https://chatbot-exa.onrender.com/chatbot', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mensagem: message }),
            });
            const data = await response.json();

            // Remove indicador de digitação
            chatMessages.removeChild(typingIndicator);

            // Renderiza a resposta do ExaBot
            await renderizarTextoGradual(data.resposta);
        } catch {
            // Remove indicador de digitação
            chatMessages.removeChild(typingIndicator);

            // Renderiza uma mensagem amigável para o usuário
            renderizarMensagem(
                "Estou com dificuldades para acessar as informações. Por favor, aguarde alguns instantes e tente novamente! 😊",
                "ExaBot"
            );
        }

        responsePending = false;
    }
};

    sendButton.addEventListener('click', sendMessage);
    chatInput.addEventListener('keypress', (event) => {
        if (event.key === 'Enter') sendMessage();
    });

    // Balão de pensamento temporário
const thoughtBubble = document.getElementById('thought-bubble');
const thoughtBubbleClose = document.getElementById('thought-bubble-close');

// Mostra o balão após 3 segundos, apenas se o chat não estiver aberto
setTimeout(() => {
    if (!chatBox.classList.contains('visible')) { // Verifica se o chat está fechado
        thoughtBubble.style.display = 'block';
    }
}, 3000);

// Fecha o balão ao clicar no "X"
thoughtBubbleClose.addEventListener('click', () => {
    thoughtBubble.style.display = 'none';
});

// Também fecha o balão ao abrir o chat
chatWidget.addEventListener('click', () => {
    thoughtBubble.style.display = 'none';
});


// Faz os botões das perguntas pré-prontas funcionarem
const questionButtons = document.querySelectorAll('.question-btn');

// Adiciona evento de clique a cada botão
questionButtons.forEach(button => {
    button.addEventListener('click', () => {
        const question = button.getAttribute('data-question'); // Obtém a pergunta do atributo data-question
        chatInput.value = question; // Preenche o campo de input com a pergunta
        sendMessage(); // Envia a mensagem como se fosse digitada pelo usuário
    });
});

</script>
</body>

</html>
